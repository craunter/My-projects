<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin Login — Food Nest Management Panel" />
  <title>Admin Login | Food Nest</title>
  <link rel="stylesheet" href="/Food-nest/assets/css/style.css" />
</head>
<body>

  <!-- Loading -->
  <div id="loading-overlay">
    <div class="loader-logo">🍽 Food Nest</div>
    <div class="loader-bar"></div>
  </div>

  <div class="admin-login-page">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-img">
          <img src="/Food-nest/assets/images/logo.jpg" alt="Food Nest Logo" />
        </div>
        <h1>Food Nest</h1>
        <p>Admin Management Portal</p>
      </div>

      <!-- Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group" style="margin-bottom:16px;">
          <label for="adminUser">Username</label>
          <input type="text" id="adminUser" placeholder="admin" value="admin" readonly
            style="cursor:not-allowed;opacity:0.7;" />
        </div>
        <div class="form-group" style="margin-bottom:20px;">
          <label for="adminPw">Password</label>
          <div class="password-wrapper">
            <input type="password" id="adminPw" placeholder="Enter admin password" required
              autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePw()" id="toggleBtn">👁</button>
          </div>
        </div>
        <div class="login-error" id="loginError">❌ Incorrect password. Please try again.</div>
        <div style="height:16px;"></div>
        <button type="submit" class="btn btn-primary btn-block">
          Login to Dashboard 🔐
        </button>
      </form>

      <div style="text-align:center;margin-top:24px;">
        <a href="/Food-nest/index.html"
          style="font-size:0.85rem;color:var(--text-muted);text-decoration:none;transition:color 0.2s;"
          onmouseover="this.style.color='var(--accent)'"
          onmouseout="this.style.color='var(--text-muted)'">
          ← Back to Main Site
        </a>
      </div>
    </div>
  </div>

  <script src="/Food-nest/assets/js/script.js"></script>
  <script>
    const ADMIN_PASSWORD = 'admin123';

    // Redirect if already logged in
    if (sessionStorage.getItem('fnAdminAuth') === 'true') {
      window.location.href = '/Food-nest/dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const pw = document.getElementById('adminPw').value;
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = 'Verifying...';
      btn.disabled = true;
      setTimeout(() => {
        if (pw === ADMIN_PASSWORD) {
          sessionStorage.setItem('fnAdminAuth', 'true');
          btn.textContent = '✅ Success! Redirecting...';
          setTimeout(() => window.location.href = '/Food-nest/dashboard.html', 700);
        } else {
          document.getElementById('loginError').style.display = 'block';
          btn.textContent = 'Login to Dashboard 🔐';
          btn.disabled = false;
          document.getElementById('adminPw').value = '';
          document.getElementById('adminPw').focus();
        }
      }, 600);
    }

    function togglePw() {
      const input = document.getElementById('adminPw');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }
  </script>
</body>
</html>
